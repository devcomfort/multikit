[tox]
envlist = py310, py311, py312, py313
min_version = 4.0

[testenv]
deps =
    pytest>=8.0
    pytest-asyncio>=0.23.0
    pytest-cov>=5.0
    aiohttp>=3.9.0
    aiofiles>=24.0.0
    aioresponses>=0.7.6
    httpx>=0.28.0
    cyclopts>=3.6
    pydantic>=2.0
    questionary>=2.1.1
    tabulate>=0.9.0
    tomli>=2.0.0
    tomli-w>=1.0.0
commands =
    pytest tests/ -v --tb=short --ignore=tests/integration {posargs}

[testenv:coverage]
deps =
    {[testenv]deps}
commands =
    pytest tests/ --ignore=tests/integration --cov=multikit --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=90

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
